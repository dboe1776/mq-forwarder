[Unit]
Description=MQ Forwarder - MQTT to QuestDB (and other sinks) pipeline
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
User=mqrouter
Group=mqrouter
WorkingDirectory=/home/mqrouter/mq-forwarder
ExecStart=/usr/local/bin/uv run main.py --log-level INFO

# Environment variables (add any you need, e.g. secrets moved out of TOML)
# Example: Environment="MQTT_PASSWORD=supersecret"

Environment="PYTHONUNBUFFERED=1"
Restart=always
RestartSec=10
StartLimitIntervalSec=60
StartLimitBurst=10

# Resource limits (optional but recommended on a shared server)
MemoryHigh=512M
CPUQuota=40%

# Logging - journald captures stdout/stderr automatically
StandardOutput=journal
StandardError=journal

[Install]
WantedBy=multi-user.target